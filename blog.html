<!-- FILE: blog.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Blog</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    body {
      background: #0f172a;
      color: white;
    }

    .content h1 {
      font-size: 2.5rem;
      margin-top: 1rem;
      margin-bottom: 1rem;
      font-weight: bold;
    }

    .content h2 {
      font-size: 2rem;
      margin-top: 2rem;
      margin-bottom: 1rem;
      font-weight: bold;
    }

    .content p {
      margin-bottom: 1rem;
      color: #cbd5e1;
      line-height: 1.8;
    }

    .content ul {
      margin-left: 1.5rem;
      margin-bottom: 1rem;
      list-style-type: disc;
    }
  </style>
</head>

<body>

  <nav class="border-b border-slate-700">
    <div class="max-w-5xl mx-auto px-6 py-5">
      <a href="index.html" class="text-slate-300 hover:text-white">
        ← Back
      </a>
    </div>
  </nav>

  <div class="max-w-4xl mx-auto px-6 py-10">
    <div id="blogContent" class="content"></div>
  </div>

  <script>
    async function loadBlog() {

      const params = new URLSearchParams(window.location.search);
      const file = params.get("file");

      const response = await fetch(`blogs/${file}`);
      const markdown = await response.text();

      document.getElementById("blogContent").innerHTML =
        marked.parse(markdown);
    }

    loadBlog();
  </script>

</body>
</html>
